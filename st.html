<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>

<style>
  /* Vanilla CSS only for things Tailwind cannot do */

  body { font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* Grain overlay using SVG noise */
  #grain {
    position: fixed;
    inset: 0;
    z-index: 9998;
    pointer-events: none;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px 128px;
  }

  /* Bar glow — Tailwind shadow doesn't do white glows */
  #bar-fill {
    box-shadow: 0 0 18px 2px rgba(255,255,255,0.5),
                0 0 40px 4px rgba(255,255,255,0.15);
  }

  /* Counter text glow */
  #counter {
    text-shadow: 0 0 60px rgba(255,255,255,0.12);
    font-feature-settings: "tnum";
  }

  /* Slide-up clip on preloader exit */
  #preloader {
    will-change: transform;
  }

  /* Content revealed beneath */
  #content {
    will-change: transform, opacity;
  }

  /* Subtle line pulse */
  @keyframes line-breathe {
    0%, 100% { opacity: 0.15; }
    50%       { opacity: 0.35; }
  }
  .deco-line { animation: line-breathe 3s ease-in-out infinite; }
</style>
</head>

<body class="bg-black text-white">

  <!-- ══════════════════════════════
       PRELOADER OVERLAY
  ══════════════════════════════ -->
  <div id="preloader" class="fixed inset-0 z-[9999] bg-black flex flex-col overflow-hidden">

    <!-- Grain texture -->
    <div id="grain"></div>

    <!-- Decorative top-left label -->
    <div id="label-tl"
         class="absolute top-8 left-8 md:top-12 md:left-12 opacity-0">
      <p class="text-[0.55rem] tracking-[0.35em] uppercase text-white/25 font-medium"
         style="font-family:'DM Sans',sans-serif">Creative Developer</p>
    </div>

    <!-- Decorative top-right label -->
    <div id="label-tr"
         class="absolute top-8 right-8 md:top-12 md:right-12 opacity-0">
      <p class="text-[0.55rem] tracking-[0.35em] uppercase text-white/25 font-medium"
         style="font-family:'DM Sans',sans-serif">Portfolio — 2025</p>
    </div>

    <!-- Horizontal deco lines -->
    <div class="deco-line absolute left-0 right-0 h-px bg-white/20" style="top:33.33%"></div>
    <div class="deco-line absolute left-0 right-0 h-px bg-white/20" style="top:66.66%"></div>

    <!-- Main content — centered -->
    <div class="flex-1 flex flex-col items-center justify-end pb-24 md:pb-28 px-8 relative z-10">

      <!-- Name / brand (top of center block) -->
      <div id="brand" class="mb-16 md:mb-20 text-center opacity-0">
        <h1 class="text-[0.6rem] tracking-[0.5em] uppercase text-white/30 font-medium"
            style="font-family:'DM Sans',sans-serif">Loading experience</h1>
      </div>

      <!-- Percentage counter -->
      <div class="relative mb-8 md:mb-10 text-center">
        <span id="counter"
              class="text-[6rem] sm:text-[8rem] md:text-[10rem] lg:text-[13rem]
                     font-black leading-none tracking-tighter text-white select-none"
              style="font-family:'Syne',sans-serif">0</span>
        <span class="absolute top-3 right-[-2.2rem] md:top-5 md:right-[-3rem]
                     text-2xl md:text-4xl font-bold text-white/50 select-none"
              style="font-family:'Syne',sans-serif">%</span>
      </div>

      <!-- Loading bar -->
      <div id="bar-wrap"
           class="w-full max-w-[480px] md:max-w-[620px] lg:max-w-[780px] opacity-0">

        <!-- Bar track -->
        <div class="relative w-full h-px bg-white/12 overflow-visible mb-4">
          <!-- Fill -->
          <div id="bar-fill"
               class="absolute top-1/2 -translate-y-1/2 left-0 h-[2px] bg-white rounded-full"
               style="width:0%"></div>
          <!-- Glow dot at tip -->
          <div id="bar-dot"
               class="absolute top-1/2 -translate-y-1/2 w-2 h-2 rounded-full bg-white -translate-x-1/2"
               style="left:0%;box-shadow:0 0 10px 3px rgba(255,255,255,0.8)"></div>
        </div>

        <!-- Bottom meta row -->
        <div class="flex items-center justify-between">
          <span class="text-[0.6rem] tracking-[0.25em] uppercase text-white/20 font-medium"
                style="font-family:'DM Sans',sans-serif">Initializing</span>
          <span id="status-text"
                class="text-[0.6rem] tracking-[0.25em] uppercase text-white/20 font-medium"
                style="font-family:'DM Sans',sans-serif">Please wait</span>
        </div>
      </div>

    </div>

    <!-- Bottom-center tiny line -->
    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 opacity-0" id="bottom-mark">
      <div class="w-px h-8 bg-gradient-to-b from-white/20 to-transparent"></div>
    </div>

  </div>

  <!-- ══════════════════════════════
       WEBSITE CONTENT (revealed after)
  ══════════════════════════════ -->
  <div id="content" class="relative z-10 opacity-0" style="transform:translateY(40px)">

    <!-- Demo hero section -->
    <section class="min-h-screen bg-[#080808] flex flex-col items-center justify-center px-8 text-center relative overflow-hidden">

      <!-- Bg glow -->
      <div class="absolute inset-0 pointer-events-none"
           style="background:radial-gradient(ellipse 60% 55% at 50% 60%, rgba(163,230,53,0.04) 0%, transparent 70%)"></div>

      <!-- Content items — revealed with stagger -->
      <p class="content-item text-[0.6rem] tracking-[0.4em] uppercase text-white/25 mb-8 font-medium opacity-0"
         style="font-family:'DM Sans',sans-serif">Creative Developer & Designer</p>

      <h1 class="content-item text-6xl sm:text-7xl md:text-8xl lg:text-9xl font-black leading-[0.92] tracking-tight opacity-0"
          style="font-family:'Syne',sans-serif">
        Crafting<br/>
        <span class="text-[#a3e635]">Digital</span><br/>
        Experiences
      </h1>

      <p class="content-item text-white/35 text-base md:text-lg font-light leading-relaxed max-w-sm mt-10 opacity-0"
         style="font-family:'DM Sans',sans-serif">
        Motion, interaction, and obsessive attention to detail — wrapped into products people love.
      </p>

      <div class="content-item mt-12 flex items-center gap-4 opacity-0">
        <a href="#"
           class="inline-flex items-center gap-2.5 bg-[#a3e635] text-black text-sm font-bold rounded-full px-7 py-3.5 hover:bg-white transition-colors duration-200"
           style="font-family:'Syne',sans-serif">
          View Work
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M7 17L17 7M17 7H7M17 7v10"/>
          </svg>
        </a>
        <a href="#"
           class="inline-flex items-center gap-2 text-sm text-white/40 hover:text-white transition-colors duration-200 font-medium"
           style="font-family:'DM Sans',sans-serif">
          Contact me →
        </a>
      </div>

    </section>

  </div>

  <script>
    /* ════════════════════════════════════
       PRELOADER — GSAP TIMELINE
    ════════════════════════════════════ */
    const preloader   = document.getElementById('preloader');
    const barFill     = document.getElementById('bar-fill');
    const barDot      = document.getElementById('bar-dot');
    const counterEl   = document.getElementById('counter');
    const barWrap     = document.getElementById('bar-wrap');
    const brand       = document.getElementById('brand');
    const labelTL     = document.getElementById('label-tl');
    const labelTR     = document.getElementById('label-tr');
    const bottomMark  = document.getElementById('bottom-mark');
    const statusText  = document.getElementById('status-text');
    const content     = document.getElementById('content');
    const contentItems = document.querySelectorAll('.content-item');

    /* Status messages that cycle during load */
    const statusMsgs = [
      'Loading assets',
      'Building layout',
      'Applying styles',
      'Almost there',
      'Ready',
    ];

    /* Counter object GSAP will tween */
    const obj = { val: 0 };

    /* ── Master timeline ── */
    const master = gsap.timeline();

    /* 1. Entrance — labels + brand + bar fade in */
    master
      .to([labelTL, labelTR], {
        opacity: 1, y: 0,
        duration: 0.8, ease: 'power3.out',
        stagger: 0.1,
      }, 0)
      .to(brand, {
        opacity: 1,
        duration: 0.6, ease: 'power3.out',
      }, 0.15)
      .to(barWrap, {
        opacity: 1,
        duration: 0.6, ease: 'power3.out',
      }, 0.25)
      .to(bottomMark, {
        opacity: 1,
        duration: 0.5, ease: 'power3.out',
      }, 0.3);

    /* 2. Bar fill + counter count-up (the main act) */
    master
      /* Bar width 0 → 100% */
      .to(barFill, {
        width: '100%',
        duration: 3.0,
        ease: 'power2.inOut',
      }, 0.5)

      /* Dot follows bar tip */
      .to(barDot, {
        left: '100%',
        duration: 3.0,
        ease: 'power2.inOut',
      }, 0.5)

      /* Counter 0 → 100 */
      .to(obj, {
        val: 100,
        duration: 3.0,
        ease: 'power2.inOut',
        onUpdate() {
          const v = Math.round(obj.val);
          counterEl.textContent = v;

          /* Subtle scale pulse on counter */
          gsap.to(counterEl, {
            scale: 1 + (Math.sin(v * 0.12) * 0.012),
            duration: 0.05,
            ease: 'none',
            overwrite: true,
          });

          /* Cycle status messages */
          const idx = Math.floor((v / 100) * (statusMsgs.length - 1));
          statusText.textContent = statusMsgs[Math.min(idx, statusMsgs.length - 1)];

          /* Bar opacity fades out near 100% for polish */
          if (v > 88) {
            gsap.to(barFill, {
              opacity: 1 - ((v - 88) / 12) * 0.3,
              duration: 0.1,
              overwrite: true,
            });
          }
        },
      }, 0.5);

    /* 3. Hold briefly at 100% */
    master.to({}, { duration: 0.35 });

    /* 4. Fade corner labels + bar */
    master
      .to([labelTL, labelTR, barWrap, brand, bottomMark], {
        opacity: 0,
        duration: 0.5,
        ease: 'power2.in',
        stagger: 0.04,
      })
      /* Counter scale down + fade */
      .to(counterEl, {
        opacity: 0,
        scale: 0.92,
        duration: 0.45,
        ease: 'power3.in',
      }, '-=0.35');

    /* 5. Slide preloader UP off screen */
    master.to(preloader, {
      yPercent: -100,
      duration: 1.1,
      ease: 'expo.inOut',
      onStart() {
        document.body.style.overflow = '';
      },
    });

    /* 6. Reveal content with parallax + stagger */
    master
      .to(content, {
        opacity: 1,
        y: 0,
        duration: 0.8,
        ease: 'power3.out',
      }, '-=0.55')
      .to(contentItems, {
        opacity: 1,
        y: 0,
        duration: 0.8,
        ease: 'power3.out',
        stagger: 0.12,
      }, '-=0.6');

    /* Lock scroll during preload */
    document.body.style.overflow = 'hidden';

    /* Ensure counter starts at 0 visually */
    counterEl.textContent = '0';
  </script>

</body>
</html>
